name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: PHP ${{ matrix.php }} / ${{ matrix.db }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']
        db: [sqlite, pgsql]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: magna_test
          POSTGRES_USER: magna
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U magna"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, pdo_sqlite, pdo_pgsql, redis
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Configure SQLite
        if: matrix.db == 'sqlite'
        run: touch database/database.sqlite

      - name: Configure PostgreSQL
        if: matrix.db == 'pgsql'
        run: |
          {
            echo "DB_CONNECTION=pgsql"
            echo "DB_HOST=127.0.0.1"
            echo "DB_PORT=5432"
            echo "DB_DATABASE=magna_test"
            echo "DB_USERNAME=magna"
            echo "DB_PASSWORD=secret"
          } >> .env

      - name: Code style (Pint)
        run: php vendor/bin/pint --test

      - name: Static analysis (PHPStan level 9)
        run: php vendor/bin/phpstan analyse --memory-limit=1G --no-progress

      - name: Tests (Pest)
        run: php artisan test

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
      - run: composer install --prefer-dist --no-interaction --no-progress
      - run: composer audit
